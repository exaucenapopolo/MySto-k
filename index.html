<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - MySto€k</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f6f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .auth-card { border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; width: 100%; max-width: 450px; background: white; }
        .auth-header { background: #212529; color: white; padding: 30px 20px; text-align: center; }
        .auth-body { padding: 30px; }
        .nav-tabs .nav-link { color: #6c757d; font-weight: bold; border: none; border-bottom: 2px solid transparent; }
        .nav-tabs .nav-link.active { color: #0d6efd; border-bottom: 2px solid #0d6efd; background: transparent; }
        .btn-google { background-color: #fff; border: 1px solid #ced4da; color: #495057; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; transition: all 0.2s; }
        .btn-google:hover { background-color: #f8f9fa; border-color: #adb5bd; }
        .divider { display: flex; align-items: center; text-align: center; margin: 20px 0; color: #adb5bd; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #dee2e6; }
        .divider:not(:empty)::before { margin-right: .25em; }
        .divider:not(:empty)::after { margin-left: .25em; }
        .logo-img { max-height: 40px; margin-bottom: 10px; }
        .destination-box { background-color: #f8f9fa; border: 1px solid #dee2e6; border-radius: 8px; padding: 15px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="auth-header">
            <img src="https://raw.githubusercontent.com/exaucenapopolo/MySto-k/refs/heads/main/logo%20mystok.png" alt="MySto€k Logo" class="logo-img" crossorigin="anonymous">
            <h3 class="mb-0 text-primary fw-bold">MySto€k</h3>
            <p class="mb-0 mt-2 small text-light fst-italic">Gestion de stock intelligente et sécurisée</p>
        </div>
        
        <div class="auth-body">
            
            <!-- SECTION DE SÉLECTION DE LA DESTINATION -->
            <div class="destination-box shadow-sm">
                <label class="form-label fw-bold text-dark mb-2"><i class="bi bi-signpost-split me-2"></i>Où souhaitez-vous aller ? *</label>
                <select id="destinationSelect" class="form-select border-primary mb-3" onchange="toggleAccessCode()">
                    <option value="">-- Choisissez une destination --</option>
                    <option value="rapport.html">📝 Espace Commercial (Rapports)</option>
                    <option value="dashboard.html">📦 Gestion des Stocks (Admin)</option>
                </select>

                <div id="accessCodeContainer" class="d-none">
                    <label class="form-label small fw-bold text-danger"><i class="bi bi-shield-lock me-1"></i>Code d'accès requis pour les stocks</label>
                    <input type="password" id="accessCodeInput" class="form-control border-danger" placeholder="Entrez le code secret...">
                </div>
            </div>
            <!-- FIN DE LA SECTION DE SÉLECTION -->

            <ul class="nav nav-tabs mb-4 w-100 d-flex" id="authTabs" role="tablist">
                <li class="nav-item flex-fill text-center" role="presentation">
                    <button class="nav-link active w-100" id="login-tab" data-bs-toggle="tab" data-bs-target="#login" type="button">Connexion</button>
                </li>
                <li class="nav-item flex-fill text-center" role="presentation">
                    <button class="nav-link w-100" id="register-tab" data-bs-toggle="tab" data-bs-target="#register" type="button">Inscription</button>
                </li>
            </ul>

            <div class="tab-content">
                <div class="tab-pane fade show active" id="login" role="tabpanel">
                    <button id="btnGoogleLogin" class="btn btn-google w-100 mb-3 py-2">
                        <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google" width="20">
                        Continuer avec Google
                    </button>
                    <div class="divider small">OU</div>
                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted">Email</label>
                            <input type="email" id="loginEmail" class="form-control" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label small fw-bold text-muted">Mot de passe</label>
                            <input type="password" id="loginPassword" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Se connecter</button>
                    </form>
                </div>

                <div class="tab-pane fade" id="register" role="tabpanel">
                    <button id="btnGoogleRegister" class="btn btn-google w-100 mb-3 py-2">
                        <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google" width="20">
                        S'inscrire avec Google
                    </button>
                    <div class="divider small">OU</div>
                    <form id="registerForm">
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted">Nom complet (Affiché sur les PDF)</label>
                            <input type="text" id="registerName" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted">Email</label>
                            <input type="email" id="registerEmail" class="form-control" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label small fw-bold text-muted">Mot de passe</label>
                            <input type="password" id="registerPassword" class="form-control" minlength="6" required>
                        </div>
                        <button type="submit" class="btn btn-success w-100 py-2 fw-bold">Créer mon compte</button>
                    </form>
                </div>
            </div>
            
            <div id="errorMessage" class="alert alert-danger mt-3 d-none small text-center"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, updateProfile, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAYcjkrXKcjqFnf8E91JZWU1lMGS-yxSOU",
            authDomain: "kdo-cameroun.firebaseapp.com",
            projectId: "kdo-cameroun",
            storageBucket: "kdo-cameroun.firebasestorage.app",
            messagingSenderId: "445876564547",
            appId: "1:445876564547:web:3b01d5bf1839458cbd1af6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        const errorDiv = document.getElementById('errorMessage');

        const SECRET_CODE = "KDO-STOCK";

        // Gérer l'affichage du champ de code d'accès
        window.toggleAccessCode = function() {
            const dest = document.getElementById('destinationSelect').value;
            const codeContainer = document.getElementById('accessCodeContainer');
            if (dest === 'dashboard.html') {
                codeContainer.classList.remove('d-none');
            } else {
                codeContainer.classList.add('d-none');
            }
        };

        function showError(msg) {
            errorDiv.innerText = msg;
            errorDiv.classList.remove('d-none');
        }

        function hideError() {
            errorDiv.classList.add('d-none');
        }

        // Fonction de vérification avant toute tentative de connexion
        function validatePreLoginChoice() {
            hideError();
            const dest = document.getElementById('destinationSelect').value;
            const code = document.getElementById('accessCodeInput').value;

            if (dest === "") {
                showError("Veuillez choisir une destination avant de vous connecter.");
                return false;
            }

            if (dest === 'dashboard.html' && code !== SECRET_CODE) {
                showError("Code d'accès incorrect pour la Gestion des Stocks.");
                return false;
            }

            // Si tout est bon, on sauvegarde la destination
            localStorage.setItem('mystoek_target_page', dest);
            return true;
        }

        function redirectUser() {
            const target = localStorage.getItem('mystoek_target_page') || 'index.html';
            window.location.href = target;
        }

        // Écouteur global : si l'utilisateur est déjà connecté et recharge la page, 
        // on ne le redirige automatiquement QUE S'IL a passé la validation, sinon on le déconnecte pour forcer le choix.
        onAuthStateChanged(auth, (user) => {
            const target = localStorage.getItem('mystoek_target_page');
            if (user && target) { 
                redirectUser(); 
            } else if (user && !target) {
                // S'il est connecté mais n'a pas fait de choix, on le déconnecte proprement pour recommencer.
                signOut(auth);
            }
        });

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            if (!validatePreLoginChoice()) return;

            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            signInWithEmailAndPassword(auth, email, password)
                .then(() => { redirectUser(); })
                .catch((error) => showError("Erreur de connexion. Vérifiez vos identifiants."));
        });

        document.getElementById('registerForm').addEventListener('submit', (e) => {
            e.preventDefault();
            if (!validatePreLoginChoice()) return;

            const name = document.getElementById('registerName').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            
            createUserWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    updateProfile(userCredential.user, { displayName: name }).then(() => {
                        redirectUser();
                    });
                })
                .catch((error) => showError("Erreur d'inscription. L'email est peut-être déjà utilisé."));
        });

        const handleGoogleAuth = () => {
            if (!validatePreLoginChoice()) return;

            signInWithPopup(auth, provider)
                .then((result) => { redirectUser(); })
                .catch((error) => showError("L'authentification Google a échoué."));
        };

        document.getElementById('btnGoogleLogin').addEventListener('click', handleGoogleAuth);
        document.getElementById('btnGoogleRegister').addEventListener('click', handleGoogleAuth);
    </script>
</body>
</html>
